services:
  postgres:
    image: postgres:16-alpine
    container_name: zhixi-guanji-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: zhixi_guanji
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - zhixi_guanji_pg:/var/lib/postgresql/data

volumes:
  zhixi_guanji_pg:
